{% extends "students/base.html" %}

{% block title %}Delete Student{% endblock %}

{% block content %}

<h2>Delete Student</h2>

<p>

Are you sure you want to delete

<strong>{{ student.name }}</strong>?

</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<p>

<a href="{% url 'student_detail' student.id %}">
Cancel
</a>

</p>

{% endblock %}
